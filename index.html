<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lapzo · Rutas de implementación TaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F7F6; --surface:#FFFFFF; --border:#E8E7E2; --border2:#F0EFEA;
  --t1:#1A1A18; --t2:#5C5B56; --t3:#9C9A93; --t4:#C4C2BB;
  --brand:#5B4CF5; --brand-lt:#EBE9FE;

  /* ── REAL LAPZO PRODUCT COLOURS ── */
  /* DxC — Desarrollo por competencias: purple */
  --dxc:   #7C3AED; --dxc-lt:#F3EFFE; --dxc-bd:#C4B5FD; --dxc-dk:#5B21B6; --dxc-icon:#A78BFA;

  /* CyA — Capacitación: peach/orange */
  --cya:   #EA580C; --cya-lt:#FFF0E8; --cya-bd:#FEB49A; --cya-dk:#C2410C; --cya-icon:#FB923C;

  /* EyC — Evaluaciones y clima: teal/mint */
  --eyc:   #0D9488; --eyc-lt:#F0FDFB; --eyc-bd:#5EEAD4; --eyc-dk:#0F766E; --eyc-icon:#2DD4BF;

  /* EyE — Estrategia y Ejecución: pink */
  --eye:   #DB2777; --eye-lt:#FFF0F7; --eye-bd:#F9A8D4; --eye-dk:#9D174D; --eye-icon:#F472B6;

  --font:'Inter',system-ui,-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.5}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:52px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:14px}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-mark{width:26px;height:26px;border-radius:7px;background:var(--t1);display:flex;align-items:center;justify-content:center}
.nav-mark svg{width:14px;height:14px}
.nav-word{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.03em}
.nav-sep{width:1px;height:16px;background:var(--border)}
.nav-crumb{font-size:12px;color:var(--t3);font-weight:500}
.nav-space{flex:1}
.nav-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:var(--brand-lt);color:var(--brand);font-size:11px;font-weight:600;border:1px solid #D4CFFC}
.nav-pill svg{width:11px;height:11px}

/* PAGE */
.page{max-width:1240px;margin:0 auto;padding:36px 28px 80px}
.hd{margin-bottom:28px}
.hd h1{font-size:24px;font-weight:700;letter-spacing:-.04em;color:var(--t1);margin-bottom:4px}
.hd p{font-size:13px;color:var(--t3)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px 11px;border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;cursor:pointer;text-align:left;white-space:nowrap;transition:border-color .15s}
.tab-name{display:block;font-size:13px;font-weight:500;color:var(--t3);transition:color .15s}
.tab-sub{display:block;font-size:10.5px;color:var(--t4);margin-top:1px}
.tab.active .tab-name{color:var(--t1)}

.panel{display:none}
.panel.active{display:block}

/* HERO */
.hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
.hero-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-ico svg{width:20px;height:20px}
.hero-body h2{font-size:18px;font-weight:700;letter-spacing:-.03em;margin-bottom:3px}
.hero-body p{font-size:12.5px;color:var(--t3);line-height:1.6;max-width:620px}

/* KPI CARDS */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden}
.kcard-stripe{position:absolute;left:0;top:0;bottom:0;width:3px}
.kcard-top{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.kcard-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kcard-mname{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.kcard-num{font-size:30px;font-weight:700;letter-spacing:-.05em;line-height:1;margin-bottom:2px}
.kcard-lbl{font-size:11px;color:var(--t3);margin-bottom:12px}
.kcard-sep{height:1px;background:var(--border2);margin-bottom:10px}
.kcard-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.kcard-list li{font-size:10.5px;color:var(--t2);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.kbullet{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* TIMELINE GRID */
.tlwrap{border-radius:16px;border:1px solid var(--border);background:var(--surface);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tlgrid{min-width:900px}

/* Month header row */
.mhdr{display:grid;grid-template-columns:150px repeat(12,1fr);background:var(--bg);border-bottom:1px solid var(--border);border-radius:16px 16px 0 0;overflow:hidden}
.mh0{padding:10px 14px;border-right:1px solid var(--border)}
.mhc{text-align:center;padding:10px 3px;font-size:9.5px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;border-right:.5px solid var(--border2)}
.mhc:last-child{border-right:none}

/*
  TRACK = one product row.
  It contains one or more SUBROWS.
  Each SUBROW is a 12-column grid of cells.
  This completely eliminates overlaps: every chip lives in its own subrow.
*/
.track{border-bottom:.5px solid var(--border2)}
.track:last-child{border-bottom:none}

.track-label-row{display:grid;grid-template-columns:150px 1fr;min-height:44px}
.tlbl{display:flex;align-items:center;gap:8px;padding:8px 14px;border-right:1px solid var(--border);background:var(--bg);grid-row:1/999}

/* subrow: a single row of 12 cells */
.subrow{display:grid;grid-template-columns:repeat(12,1fr)}
.cell{padding:3px 2px;min-height:40px;border-right:.5px solid var(--border2);position:relative}
.cell:last-child{border-right:none}

/* First subrow has top padding, last has bottom padding */
.subrow:first-child .cell{padding-top:5px}
.subrow:last-child .cell{padding-bottom:5px}

/* CHIPS */
/* Normal chip fills its cell */
.chip{border-radius:6px;padding:5px 7px;cursor:pointer;transition:opacity .1s,transform .1s;display:flex;flex-direction:column;width:100%}
.chip:hover{opacity:.85;transform:translateY(-1px)}
.chip-n{font-size:9.5px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.chip-v{font-size:8px;font-weight:400;opacity:.72;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Span chip: absolute, stretches across multiple cells */
.chip-sp{position:absolute;left:2px;top:5px;z-index:10;border-radius:6px;padding:5px 8px;cursor:pointer;transition:opacity .1s,transform .1s;white-space:nowrap;display:flex;flex-direction:column}
.chip-sp:hover{opacity:.85;transform:translateY(-1px)}
.chip-sp .chip-n{white-space:nowrap;overflow:visible;display:block;-webkit-line-clamp:unset}
.chip-sp .chip-v{white-space:nowrap}
/* Span parent cell needs position:relative and correct height */
.cell-sp{position:relative;min-height:40px}

/* TOOLTIP */
.tt{position:absolute;z-index:500;width:220px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 24px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05)}
.tt.show{opacity:1}
.tt-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:5px}
.tt-badge{display:inline-block;font-size:9.5px;font-weight:500;padding:2px 8px;border-radius:20px;margin-bottom:8px}
.tt-desc{font-size:11px;color:var(--t2);line-height:1.55}
.tt-role{margin-top:8px;padding-top:8px;border-top:1px solid var(--border2);font-size:10px;color:var(--t3)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px}
.legitem{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)}
.legdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
</style>
</head>

/* ── UI BUILD ── */
let cur = 'ideal', openTT = null;
const tabsEl   = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

ROUTES.forEach(r => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (r.id === cur ? ' active' : '');
  btn.dataset.id = r.id;
  btn.innerHTML = `<span class="tab-name">${r.tname}</span><span class="tab-sub">${r.tsub}</span>`;
  btn.style.borderBottomColor = r.id === cur ? r.color : 'transparent';
  if (r.id === cur) btn.querySelector('.tab-name').style.color = r.color;
  btn.addEventListener('click', () => activate(r.id));
  tabsEl.appendChild(btn);
});

function activate(id) {
  cur = id;
  document.querySelectorAll('.tab').forEach(t => {
    const rr = ROUTES.find(x => x.id === t.dataset.id);
    const on = t.dataset.id === id;
    t.classList.toggle('active', on);
    t.style.borderBottomColor = on ? rr.color : 'transparent';
    t.querySelector('.tab-name').style.color = on ? rr.color : '';
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.id === id));
  closeTT();
}
function closeTT() { if (openTT) { openTT.remove(); openTT = null; } }
document.addEventListener('click', () => closeTT());

ROUTES.forEach(r => {
  const panel = document.createElement('div');
  panel.className = 'panel' + (r.id === cur ? ' active' : '');
  panel.dataset.id = r.id;

  /* KPI cards */
  const khtml = r.kpis.map(k => {
    const m = MOD[k.mod];
    const items = k.items.map(i => `<li><span class="kbullet" style="background:${m.dot}"></span>${i}</li>`).join('');
    return `<div class="kcard">
      <div class="kcard-stripe" style="background:${m.dot}"></div>
      <div class="kcard-top"><span class="kcard-dot" style="background:${m.dot}"></span><span class="kcard-mname">${m.name}</span></div>
      <div class="kcard-num" style="color:${m.dot}">${k.num}</div>
      <div class="kcard-lbl">${k.lbl}</div>
      <div class="kcard-sep"></div>
      <ul class="kcard-list">${items}</ul>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="hero">
      <div class="hero-ico" style="background:${r.ibg};color:${r.color}">${ICO[r.icon]}</div>
      <div class="hero-body"><h2 style="color:${r.color}">${r.tname}</h2><p>${r.desc}</p></div>
    </div>
    <div class="krow">${khtml}</div>
    <div class="tlwrap"><div class="tlgrid" id="g-${r.id}"></div></div>
    <div class="legend" id="l-${r.id}"></div>`;

  panelsEl.appendChild(panel);
  buildGrid(r, panel.querySelector(`#g-${r.id}`));

  const legEl = panel.querySelector(`#l-${r.id}`);
  ORD.forEach(k => {
    const col = MOD[k];
    legEl.innerHTML += `<span class="legitem"><span class="legdot" style="background:${col.dot}"></span>${col.name}</span>`;
  });
});

/* ── GRID BUILDER ──
   Key insight: tracks[mod] = array of ROWS.
   Each row is its own subrow in the grid → zero overlaps guaranteed.
   Span chips use absolute positioning within a position:relative cell,
   but since each row is isolated, they can never collide with other rows.
*/
function buildGrid(r, grid) {
  /* Month header */
  const mhdr = document.createElement('div');
  mhdr.className = 'mhdr';
  mhdr.innerHTML = '<div class="mh0"></div>' +
    Array.from({length:12}, (_, i) => `<div class="mhc">M${i+1}</div>`).join('');
  grid.appendChild(mhdr);

  ORD.forEach(tk => {
    const col   = MOD[tk];
    const rows  = r.tracks[tk] || [[]];

    /* Outer track wrapper — spans all subrows */
    const track = document.createElement('div');
    track.className = 'track';

    /* Inner layout: label + subrows column */
    const inner = document.createElement('div');
    inner.style.cssText = 'display:grid;grid-template-columns:150px 1fr';
    track.appendChild(inner);

    /* Label — spans all subrows vertically */
    const lbl = document.createElement('div');
    lbl.className = 'tlbl';
    lbl.style.cssText = `border-right:1px solid var(--border);background:var(--bg);align-self:stretch`;
    lbl.innerHTML = `<span class="tdot" style="width:7px;height:7px;border-radius:50%;background:${col.dot};flex-shrink:0"></span>
      <span class="tname" style="font-size:11px;font-weight:500;color:${col.tx}">${col.name}</span>`;
    inner.appendChild(lbl);

    /* Subrows container */
    const subsCont = document.createElement('div');
    inner.appendChild(subsCont);

    rows.forEach((rowBlocks, ri) => {
      const subrow = document.createElement('div');
      subrow.className = 'subrow';
      if (ri === 0 && rows.length > 1) subrow.style.borderBottom = '.5px solid ' + col.bd + '22';

      /* Build 12 cells for this subrow */
      const cells = {};
      for (let m = 1; m <= 12; m++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cells[m] = cell;
        subrow.appendChild(cell);
      }

      /* Place chips */
      rowBlocks.forEach(b => {
        const sp = b.s || 1;
        if (sp === 1) {
          /* Normal chip */
          const chip = mkChip(b, col, false, grid);
          cells[b.m].appendChild(chip);
        } else {
          /* Span chip: absolute within start cell, width spans sp cells */
          cells[b.m].style.position = 'relative';
          cells[b.m].style.minHeight = '40px';
          const chip = mkChip(b, col, true, grid);
          chip.style.width = `calc(${sp * 100}% + ${(sp-1)*3}px)`;
          cells[b.m].appendChild(chip);
        }
      });

      subsCont.appendChild(subrow);
    });

    grid.appendChild(track);
  });
}

function mkChip(b, col, isSpan, grid) {
  const chip = document.createElement('div');
  chip.className = isSpan ? 'chip-sp' : 'chip';
  chip.style.cssText = `background:${col.bg};border:.5px solid ${col.bd};color:${col.tx}`;
  chip.innerHTML = `<span class="chip-n">${b.t}</span><span class="chip-v" style="color:${col.dot}">${b.v}</span>`;

  chip.addEventListener('click', e => {
    e.stopPropagation();
    closeTT();
    const tt = document.createElement('div');
    tt.className = 'tt show';
    tt.innerHTML = `<div class="tt-title">${b.t}</div>
      <span class="tt-badge" style="background:${col.bg};color:${col.tx};border:.5px solid ${col.bd}">${b.v}</span>
      <div class="tt-desc">${b.d}</div>
      <div class="tt-role">Responsable · ${b.r}</div>`;
    chip.style.position = 'relative';
    chip.appendChild(tt);
    openTT = tt;
    requestAnimationFrame(() => {
      const cr = chip.getBoundingClientRect();
      const gr = grid.getBoundingClientRect();
      tt.style.top  = (chip.offsetHeight + 6) + 'px';
      const ov = cr.left + 226 - gr.right;
      tt.style.left = ov > 0 ? (-ov - 10) + 'px' : '0';
    });
  });
  return chip;
}
